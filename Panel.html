<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Dashboard</title>
    <link rel="stylesheet" href="Style.css">
</head>
<body>
    <header class="header">
        <div class="header-content">
            <h1 class="logo">AdminPanel</h1>
            <div class="user-info">
                <span class="user-name">Juan Perez</span>
                <div class="user-avatar">JP</div>
            </div>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <nav class="sidebar-nav">
                <ul class="nav-list">
                    <li class="nav-item">
                        <a href="#Dashboard" class="nav-link active">
                            <span class="nav-icon">📊</span>
                            <span class="nav-text">Dashboard</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#Producto" class="nav-link">
                            <span class="nav-item">🛒</span>
                            <span class="nav-text">Productos</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#Usuarios" class="nav-link">
                            <span class="nav-icon">🧍</span>
                            <span class="nav-text">Usuarios</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#Ventas" class="nav-link">
                            <span class="nav-icon">🛍️</span>
                            <span class="nav-text">Ventas</span>
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="#Configuraciones" class="nav-link">
                            <span class="nav-icon">⚙️</span>
                            <span class="nav-text">Configuración</span>
                        </a>
                    </li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <div class="content-header">
                <h2 class="page-title">Dashboard</h2>
                <p class="page-description">Vista general del sistema</p>
            </div>

            <section class="stats-section">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon user-bg">👤</div>
                        <div class="stat-info">
                            <h3 class="stat-number">900</h3>
                            <p class="stat-label">Usuarios</p>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-icon prod-bg">🛒</div>
                        <div class="stat-info">
                            <h3 class="stat-number">1,000</h3>
                            <p class="stat-label">Productos</p>
                        </div>
                    </div>

                    <div class="stat-card">
                        <div class="stat-icon sale-bg">💰</div>
                        <div class="stat-info">
                            <h3 class="stat-number">1,500</h3>
                            <p class="stat-label">Ventas</p>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
